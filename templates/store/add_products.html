{% extends "store/base.html" %}
{% block title %}Bulk Add Products{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto py-24 px-4">
  <h1 class="text-3xl font-bold mb-10">Bulk Add Products</h1>

  <form method="post" enctype="multipart/form-data" class="space-y-12">
    {% csrf_token %}
    <div id="products" class="space-y-8">

      <div class="product-row relative grid grid-cols-1 lg:grid-cols-3 gap-6 p-4 border rounded-lg">
        <button type="button" onclick="removeRow(this)"
          class="absolute top-2 right-4 text-gray-500 hover:text-red-600 text-xl font-bold cursor-pointer">×</button>

        <!-- LEFT: Category, Name, Price, Discount, Sizes -->
        <div class="space-y-4">
          <label class="block font-semibold">Category</label>
          <select name="category_0" class="border px-4 py-3 w-full cursor-pointer">
            <option value="">—</option>
            {% for category in categories %}
            <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
          </select>

          <label class="block font-semibold">Product Name</label>
          <input name="name" placeholder="Product Name" class="border p-3 w-full" required />

          <label class="block font-semibold">Price</label>
          <input name="price" type="number" step="0.01" class="border p-3 w-full" placeholder="Price" required />

          <label class="block font-semibold">Discount %</label>
          <input name="discount_percent" type="number" min="0" max="100" class="border p-3 w-full" placeholder="Discount %" />

          <div class="grid grid-cols-3 grid-rows-2 gap-4 mt-2">
            {% for size in sizes %}
            <div class="flex flex-col items-center">
              <label class="text-sm font-semibold">{{ size }}</label>
              <input name="stock_{{ size }}_0" type="number" min="0" placeholder="Stock"
                class="border p-2 w-18 text-center" />
            </div>
            {% endfor %}
          </div>
        </div>

        <!-- MIDDLE: Tags -->
        <div>
          <label class="block font-semibold mb-2">Tags</label>
          <input type="text" placeholder="Search tags..." class="border px-3 py-2 w-full mb-2 rounded"
            onkeyup="filterTags(this, 0)" id="tags-search-0" />
          <div id="tags-container-0" class="flex flex-col gap-2 max-h-[400px] overflow-y-auto p-2 rounded">
            {% for tag in tags %}
            <label class="flex items-center gap-2 cursor-pointer border rounded-full px-3 py-1 hover:bg-gray-100 tag-item">
              <input type="checkbox" name="tags_0" value="{{ tag.id }}" />
              <span class="text-sm">{{ tag.name }}</span>
            </label>
            {% endfor %}
          </div>
        </div>

        <!-- RIGHT: Images -->
        <div>
          <label class="block font-semibold mb-2">Images</label>
          <input type="file" name="images_0" multiple class="border p-2 w-full cursor-pointer"
            onchange="previewImages(this, 0)" />
          <div id="preview-0" class="flex gap-4 flex-wrap mt-4"></div>
        </div>
      </div>

    </div>

    <button type="button" onclick="addRow()" class="border px-5 py-2 cursor-pointer">Add another product</button>
    <button type="submit" class="border bg-black text-white px-5 py-2 cursor-pointer">Save as Draft</button>
  </form>
</div>

<script>
let rowIndex = 1;
const sizes = {{ sizes|safe }};
const tags = [
  {% for tag in tags %}{id: {{ tag.id }}, name: "{{ tag.name }}"}{% if not forloop.last %},{% endif %}{% endfor %}
];
const categoriesOptions = `{% for category in categories %}<option value="{{ category.id }}">{{ category.name }}</option>{% endfor %}`;
const selectedFiles = {}; // tracks files per row

function removeRow(btn) {
  const row = btn.closest(".product-row");
  const idx = Array.from(document.querySelectorAll(".product-row")).indexOf(row);
  delete selectedFiles[idx];
  row.remove();
}

function previewImages(input, idx) {
  const preview = document.getElementById(`preview-${idx}`);
  preview.innerHTML = "";
  selectedFiles[idx] = selectedFiles[idx] || [];

  // Add new files
  Array.from(input.files).forEach(f => selectedFiles[idx].push(f));
  input.value = ""; // clear input so user can re-add more files if needed

  selectedFiles[idx].forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = e => {
      const div = document.createElement("div");
      div.className = "flex flex-col items-center w-32 relative";

      const btn = document.createElement("button");
      btn.type = "button";
      btn.innerText = "×";
      btn.className = "absolute top-[-4px] right-[-4px] flex items-center justify-center bg-black hover:bg-red-600 text-white rounded w-4 h-4 text-sm cursor-pointer";

      // Remove file from selectedFiles and rebuild input.files
      btn.onclick = () => {
        selectedFiles[idx].splice(i, 1);
        div.remove();
        rebuildInputFiles(idx);
      };

      const img = document.createElement("img");
      img.src = e.target.result;
      img.className = "w-full h-32 object-cover border rounded";

      const order = document.createElement("input");
      order.type = "number";
      order.name = `image_order_${idx}[]`;
      order.value = i;
      order.className = "mt-1 w-full border p-1 text-center text-sm";

      div.appendChild(btn);
      div.appendChild(img);
      div.appendChild(order);
      preview.appendChild(div);
    };
    reader.readAsDataURL(file);
  });

  rebuildInputFiles(idx);
}

// Rebuild the hidden input files from selectedFiles
function rebuildInputFiles(idx) {
  const input = document.querySelector(`input[name="images_${idx}"]`);
  if (!input) return;
  const dt = new DataTransfer();
  selectedFiles[idx].forEach(f => dt.items.add(f));
  input.files = dt.files;
}

function addRow() {
  const productsDiv = document.getElementById("products");
  const div = document.createElement("div");
  div.className = "product-row relative grid grid-cols-1 lg:grid-cols-3 gap-6 p-4 border rounded-lg";

  div.innerHTML = `
    <button type="button" onclick="removeRow(this)"
      class="absolute top-2 right-4 text-gray-500 hover:text-red-600 text-xl font-bold cursor-pointer">×</button>

    <div class="space-y-4">
      <label class="block font-semibold">Category</label>
      <select name="category_${rowIndex}" class="border px-4 py-3 w-full cursor-pointer">
        <option value="">—</option>${categoriesOptions}</select>
      <label class="block font-semibold">Product Name</label>
      <input name="name" placeholder="Product Name" class="border p-3 w-full" required />
      <label class="block font-semibold">Price</label>
      <input name="price" type="number" step="0.01" class="border p-3 w-full" required />
      <label class="block font-semibold">Discount %</label>
      <input name="discount_percent" type="number" min="0" max="100" class="border p-3 w-full" />
      <div class="grid grid-cols-3 grid-rows-2 gap-4 mt-2">
        ${sizes.map(s => `<div class="flex flex-col items-center"><label class="text-sm font-semibold">${s}</label><input name="stock_${s}_${rowIndex}" type="number" min="0" placeholder="Stock" class="border p-2 w-18 text-center" /></div>`).join('')}
      </div>
    </div>

    <div>
      <label class="block font-semibold mb-2">Tags</label>
      <input type="text" placeholder="Search tags..." class="border px-3 py-2 w-full mb-2 rounded" onkeyup="filterTags(this, ${rowIndex})" id="tags-search-${rowIndex}" />
      <div id="tags-container-${rowIndex}" class="flex flex-col gap-2 max-h-[400px] overflow-y-auto p-2 rounded">
        ${tags.map(t => `<label class="flex items-center gap-2 cursor-pointer border rounded-full px-3 py-1 hover:bg-gray-100 tag-item"><input type="checkbox" name="tags_${rowIndex}" value="${t.id}"><span class="text-sm">${t.name}</span></label>`).join('')}
      </div>
    </div>

    <div>
      <label class="block font-semibold mb-2">Images</label>
      <input type="file" name="images_${rowIndex}" multiple class="border p-2 w-full cursor-pointer" onchange="previewImages(this, ${rowIndex})" />
      <div id="preview-${rowIndex}" class="flex gap-4 flex-wrap mt-4"></div>
    </div>
  `;

  productsDiv.appendChild(div);
  rowIndex++;
}

function filterTags(input, idx) {
  const filter = input.value.toLowerCase();
  const container = document.getElementById(`tags-container-${idx}`);
  container.querySelectorAll(".tag-item").forEach(tag => {
    tag.style.display = tag.innerText.toLowerCase().includes(filter) ? "flex" : "none";
  });
}
</script>
{% endblock %}
