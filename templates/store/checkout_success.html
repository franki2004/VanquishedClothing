{% extends "store/base.html" %}

{% block title %}Order Success{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] text-center px-4">
  <!-- Checkmark -->
  <div class="text-green-600 mb-6">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
    </svg>
  </div>

  <!-- Success message -->
  <h1 class="text-3xl font-bold mb-2">Thank you for your order!</h1>
  <p class="text-gray-700 mb-6">Your payment was successful and your order is being processed.</p>

  <!-- Button back to home -->
  <a href="{% url 'home' %}" class="px-6 py-3 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
    Back to Home
  </a>
</div>
{% endblock %}
