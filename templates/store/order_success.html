{%extends 'store/base.html'%}
{% block content %} 
<div class="max-w-xl mx-auto mt-32 text-center space-y-6">

    <div class="text-green-600 text-5xl">✓</div>
  
    <h1 class="text-3xl font-semibold">Order Completed</h1>
  
    <p class="text-gray-600">
      Your order has been received and is being processed.
    </p>
  
    <div class="border rounded-xl p-6 text-left space-y-2">
      <p><strong>Order ID:</strong> #{{ order.id }}</p>
      <p><strong>Status:</strong> {{ order.status }}</p>
      <p><strong>Total:</strong> €{{ order.total }}</p>
    </div>
  
    <a href="/" class="inline-block bg-black text-white px-6 py-3 rounded-xl">
      Back to Home
    </a>
  
  </div>
{% endblock %}
