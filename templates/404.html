{% extends "store/base.html" %}
{% load static %}

{% block title %}404 - Not Found{% endblock %}

{% block content %}

<div class="flex items-center justify-center min-h-[70vh] px-6 text-center">
  <div>
    <h1 class="text-8xl font-light tracking-tight">404</h1>

    <p class="mt-6 text-lg uppercase tracking-wide">
      Page Not Found
    </p>

    <p class="mt-4 text-sm text-gray-500 max-w-md mx-auto">
      The page you are looking for does not exist or has been moved.
    </p>

    <div class="mt-10 flex justify-center gap-6">
      <a href="{% url 'home' %}"
         class="border border-black px-6 py-3 text-sm uppercase tracking-wide hover:bg-black hover:text-white transition">
        Back Home
      </a>

      <a href="{% url 'collection' %}"
         class="border border-black px-6 py-3 text-sm uppercase tracking-wide hover:bg-black hover:text-white transition">
        Continue Shopping
      </a>
    </div>
  </div>
</div>

{% endblock %}
